name: Bug Report
description: Report a bug in LAAF
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: LAAF Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. laaf scan --target mock ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      render: shell

  - type: input
    id: platform
    attributes:
      label: Target Platform
      placeholder: "e.g. mock, openai, anthropic"
