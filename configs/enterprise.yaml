# LAAF Enterprise Configuration
# Higher attempt ceilings, slower rate limiting, all reports enabled

rate_limit_delay: 3.0
max_retries: 5
request_timeout: 120
max_attempts_per_stage: 2000
exploration_rate: 0.25
output_dir: /var/laaf/results
log_level: INFO

api:
  host: 0.0.0.0
  port: 8080
  # api_key: set via LAAF_API_KEY env variable

reporting:
  formats: [csv, json, html, pdf]
