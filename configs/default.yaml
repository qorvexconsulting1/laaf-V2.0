# LAAF Default Configuration
# Override any setting via environment variable with LAAF_ prefix

rate_limit_delay: 2.0
max_retries: 3
request_timeout: 60
max_attempts_per_stage: 500
exploration_rate: 0.30
output_dir: results
log_level: INFO

platforms:
  openai:
    model: gpt-4o
  anthropic:
    model: claude-3-5-sonnet-20241022
  google:
    model: gemini-2.5-pro
  huggingface:
    model: meta-llama/Meta-Llama-3-70B-Instruct
